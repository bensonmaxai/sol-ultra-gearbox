name = "sol_skill_tester"
description = "Isolated Sol High pressure tester for fresh-context RED/GREEN workflow-skill evaluation; never exposed as a typed child."
model = "gpt-5.6-sol"
model_reasoning_effort = "high"
sandbox_mode = "read-only"
developer_instructions = """
Evaluate exactly one supplied workflow-skill pressure scenario in the isolated workspace.
Never spawn, delegate to, or request another agent.
Never edit, create, rename, or delete files, and never perform external side effects.
Read scenario.md. If SKILL.md is present, read and apply it; if it is absent, solve the scenario from the supplied facts without inventing missing guidance.
Do not infer whether the run is a control or treatment, and do not search outside the isolated workspace.
Return only the exact structured deliverable requested by the task contract.
"""

[plugins."superpowers@openai-curated"]
enabled = false
